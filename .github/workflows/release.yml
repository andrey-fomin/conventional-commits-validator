name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BIN_NAME: ccval

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches Cargo version
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          if [[ "$tag_version" != "$cargo_version" ]]; then
            printf "Tag version %s does not match Cargo.toml version %s\n" "$tag_version" "$cargo_version" >&2
            exit 1
          fi

      - name: Run tests
        run: cargo test

  create-release:
    name: Create release
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  release:
    name: Release ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_suffix: ""
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_suffix: ".exe"
          - os: macos-13
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            binary_suffix: ""
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_suffix: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          package_dir="${BIN_NAME}-${version}-${{ matrix.target }}"
          mkdir -p "dist/${package_dir}"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}${{ matrix.binary_suffix }}" "dist/${package_dir}/"
          cp README.md "dist/${package_dir}/"
          tar -C dist -czf "dist/${package_dir}.tar.gz" "${package_dir}"
          shasum -a 256 "dist/${package_dir}.tar.gz" > "dist/${package_dir}.tar.gz.sha256"

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $packageDir = "${env:BIN_NAME}-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$packageDir" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${env:BIN_NAME}${{ matrix.binary_suffix }}" "dist/$packageDir/"
          Copy-Item README.md "dist/$packageDir/"
          Compress-Archive -Path "dist/$packageDir/*" -DestinationPath "dist/$packageDir.zip" -Force
          $hash = (Get-FileHash "dist/$packageDir.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $packageDir.zip" | Out-File -FilePath "dist/$packageDir.zip.sha256" -Encoding ascii

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.zip
            dist/*.zip.sha256
