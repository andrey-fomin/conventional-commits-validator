name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

env:
  BIN_NAME: ccval

jobs:
  build-artifacts:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_suffix: ""
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_suffix: ".exe"
          - os: windows-2022
            target: aarch64-pc-windows-msvc
            archive_ext: zip
            binary_suffix: ".exe"
          - os: ubuntu-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            binary_suffix: ""
            use_zigbuild: true
          - os: ubuntu-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_suffix: ""
            use_zigbuild: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_suffix: ""
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install ARM cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install Zig
        if: matrix.use_zigbuild
        uses: mlugg/setup-zig@v2
        with:
          version: '0.15.2'

      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.use_zigbuild }}" = "true" ]; then
            cargo zigbuild --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          version="${{ github.event.release.tag_name }}"
          package_dir="${BIN_NAME}-${version}-${{ matrix.target }}"
          mkdir -p "dist/${package_dir}"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}${{ matrix.binary_suffix }}" "dist/${package_dir}/"
          cp README.md "dist/${package_dir}/"
          tar -C dist -czf "dist/${package_dir}.tar.gz" "${package_dir}"
          shasum -a 256 "dist/${package_dir}.tar.gz" > "dist/${package_dir}.tar.gz.sha256"

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name }}"
          $packageDir = "${env:BIN_NAME}-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$packageDir" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${env:BIN_NAME}${{ matrix.binary_suffix }}" "dist/$packageDir/"
          Copy-Item README.md "dist/$packageDir/"
          Compress-Archive -Path "dist/$packageDir/*" -DestinationPath "dist/$packageDir.zip" -Force
          $hash = (Get-FileHash "dist/$packageDir.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $packageDir.zip" | Out-File -FilePath "dist/$packageDir.zip.sha256" -Encoding ascii

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist-${{ matrix.target }}
          path: dist/

  upload-release-artifacts:
    name: Upload release artifacts
    needs: build-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Download built artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: dist-*
          path: .
          merge-multiple: true

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"
          gh release upload "$TAG" dist/*.tar.gz dist/*.tar.gz.sha256 dist/*.zip dist/*.zip.sha256 --clobber

  docker-alpine:
    name: Docker (Alpine)
    needs: upload-release-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Extract version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=${VERSION%%.*}" >> "$GITHUB_OUTPUT"
          echo "minor=$(printf '%s' "$VERSION" | cut -d. -f1,2)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Alpine image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.alpine
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            andreyfomin/ccval:${{ steps.version.outputs.version }}
            andreyfomin/ccval:${{ steps.version.outputs.major }}
            andreyfomin/ccval:${{ steps.version.outputs.minor }}
            andreyfomin/ccval:latest

  docker-distroless:
    name: Docker (Distroless)
    needs: upload-release-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Extract version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=${VERSION%%.*}" >> "$GITHUB_OUTPUT"
          echo "minor=$(printf '%s' "$VERSION" | cut -d. -f1,2)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Distroless image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.distroless
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            andreyfomin/ccval:${{ steps.version.outputs.version }}-distroless
            andreyfomin/ccval:${{ steps.version.outputs.major }}-distroless
            andreyfomin/ccval:${{ steps.version.outputs.minor }}-distroless
            andreyfomin/ccval:distroless
