name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  rust-checks:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test

  commit-check:
    name: Validate commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check single commit
        run: |
          set -euo pipefail
          commit_count=$(git rev-list --count --no-merges ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})
          if [ "$commit_count" -ne 1 ]; then
            echo "Error: PR must contain exactly one commit, but has $commit_count commits."
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build ccval
        run: cargo build --release

      - name: Validate commits
        if: github.event.pull_request.user.type != 'Bot'
        run: ./target/release/ccval -- ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} --no-merges

  cross-build:
    name: Cross-build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            target: x86_64-unknown-linux-gnu
            use_zigbuild: false
          - os: ubuntu-latest
            label: linux-aarch64
            target: aarch64-unknown-linux-gnu
            use_zigbuild: false
          - os: ubuntu-latest
            label: macos-x86_64
            target: x86_64-apple-darwin
            use_zigbuild: true
          - os: ubuntu-latest
            label: macos-aarch64
            target: aarch64-apple-darwin
            use_zigbuild: true
          - os: windows-2022
            label: windows-x86_64
            target: x86_64-pc-windows-msvc
            use_zigbuild: false
          - os: windows-2022
            label: windows-aarch64
            target: aarch64-pc-windows-msvc
            use_zigbuild: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install ARM cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install Zig
        if: matrix.use_zigbuild
        uses: mlugg/setup-zig@v2
        with:
          version: '0.15.2'

      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Build release target
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.use_zigbuild }}" = "true" ]; then
            cargo zigbuild --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

  docker:
    name: Docker smoke build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Build for linux/amd64 only to keep CI fast.
      # Multi-arch builds with QEMU emulation are significantly slower.
      # Full multi-arch verification happens in the release workflow.
      - name: Build Alpine image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.alpine
          platforms: linux/amd64
          push: false

      - name: Build Distroless image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.distroless
          platforms: linux/amd64
          push: false

  release-config:
    name: Release config validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Validate release-plz config syntax
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import tomllib
          from pathlib import Path

          with Path("release-plz.toml").open("rb") as fh:
              tomllib.load(fh)
          PY
